<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Student OS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(circle at 10% 20%, rgba(108, 92, 231, 0.15) 0%, rgba(0, 0, 0, 0) 90%), var(--bg-app);
    }
    
    .forgot-container {
      width: 440px;
      max-width: 100%;
    }
    
    .forgot-card {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: 10px;
    }
    .back-btn:hover {
      color: var(--primary);
    }
    
    .alert-box {
      padding: 12px;
      border-radius: var(--border-radius-sm);
      font-size: 0.9rem;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .alert-error {
      background: rgba(255, 71, 87, 0.15);
      border: 1px solid var(--danger);
      color: #ff4757;
    }
    .alert-success {
      background: rgba(46, 213, 115, 0.15);
      border: 1px solid var(--success);
      color: #2ed573;
    }
  </style>
</head>
<body>

  <div class="forgot-container">
    <a href="login.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
    
    <div class="card forgot-card">
      <h2 style="font-weight: 700; font-size: 1.5rem; text-align: center;">Reset Password</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-bottom: 10px;">
        Follow the security prompts to recover your Student OS account.
      </p>
      
      <div id="alertBox" class="alert-box"></div>
      
      <!-- STEP 1: Enter Username -->
      <div id="step1">
        <form onsubmit="fetchQuestion(event)">
          <div class="input-group">
            <label class="input-label">Username</label>
            <input type="text" id="usernameInput" class="input-field" placeholder="Enter your username" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">
            Verify Username <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>
      </div>
      
      <!-- STEP 2: Answer Question and Reset -->
      <div id="step2" style="display: none;">
        <form onsubmit="resetPassword(event)">
          <div class="input-group">
            <label class="input-label">Security Question</label>
            <div id="questionText" style="padding: 12px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); font-weight: 500;"></div>
          </div>
          
          <div class="input-group">
            <label class="input-label">Your Answer</label>
            <input type="text" id="answerInput" class="input-field" placeholder="Enter answer" required>
          </div>
          
          <div class="input-group">
            <label class="input-label">New Password</label>
            <input type="password" id="newPasswordInput" class="input-field" placeholder="Enter new password" required>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%;">
            Reset Password <i class="fa-solid fa-key"></i>
          </button>
        </form>
      </div>
      
    </div>
  </div>

  <script>
    let currentUsername = '';

    function showAlert(msg, isSuccess = false) {
      const alertBox = document.getElementById('alertBox');
      alertBox.innerText = msg;
      alertBox.className = 'alert-box ' + (isSuccess ? 'alert-success' : 'alert-error');
      alertBox.style.display = 'block';
    }

    async function fetchQuestion(e) {
      e.preventDefault();
      const username = document.getElementById('usernameInput').value;
      const alertBox = document.getElementById('alertBox');
      alertBox.style.display = 'none';

      try {
        const response = await fetch(`/api/auth/security-question?username=${encodeURIComponent(username)}`);
        const data = await response.json();
        
        if (response.ok) {
          currentUsername = username;
          document.getElementById('questionText').innerText = data.securityQuestion;
          document.getElementById('step1').style.display = 'none';
          document.getElementById('step2').style.display = 'block';
        } else {
          showAlert(data.error || 'Username not found.');
        }
      } catch (err) {
        showAlert('Network error, please try again.');
      }
    }

    async function resetPassword(e) {
      e.preventDefault();
      const securityAnswer = document.getElementById('answerInput').value;
      const newPassword = document.getElementById('newPasswordInput').value;
      const alertBox = document.getElementById('alertBox');
      alertBox.style.display = 'none';

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: currentUsername,
            securityAnswer,
            newPassword
          })
        });

        const data = await response.json();
        if (response.ok) {
          showAlert('Password updated successfully! Redirecting...', true);
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 1500);
        } else {
          showAlert(data.error || 'Password reset failed.');
        }
      } catch (err) {
        showAlert('Network error, please try again.');
      }
    }
  </script>
</body>
</html>

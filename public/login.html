<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Student OS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(circle at 10% 20%, rgba(108, 92, 231, 0.15) 0%, rgba(0, 0, 0, 0) 90%), var(--bg-app);
    }
    
    .login-container {
      width: 480px;
      max-width: 100%;
      perspective: 1000px;
    }
    
    .login-card {
      transition: transform 0.6s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .logo-badge {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      gap: 12px;
    }
    
    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      box-shadow: var(--shadow-glow);
    }
    
    .logo-text {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--text-main), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .tab-buttons {
      display: flex;
      background: var(--bg-input);
      border-radius: var(--border-radius-sm);
      padding: 4px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }
    
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-family);
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      transition: var(--transition);
    }
    
    .tab-btn.active {
      background: var(--bg-card);
      color: var(--text-main);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
    }
    
    .form-panel {
      display: none;
      animation: fadeIn 0.4s ease;
    }
    
    .form-panel.active {
      display: block;
    }
    
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.85rem;
      margin-top: -8px;
      margin-bottom: 20px;
      color: var(--text-muted);
    }
    
    .forgot-link:hover {
      color: var(--primary);
    }
    
    .alert-box {
      padding: 12px;
      border-radius: var(--border-radius-sm);
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .alert-error {
      background: rgba(255, 71, 87, 0.15);
      border: 1px solid var(--danger);
      color: #ff4757;
    }
    .alert-success {
      background: rgba(46, 213, 115, 0.15);
      border: 1px solid var(--success);
      color: #2ed573;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="card login-card">
      
      <div class="logo-badge">
        <div class="logo-icon">S</div>
        <div class="logo-text">Student OS</div>
      </div>
      
      <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('register')">Sign Up</button>
      </div>
      
      <div id="alertBox" class="alert-box"></div>
      
      <!-- LOGIN FORM -->
      <div id="loginPanel" class="form-panel active">
        <form onsubmit="handleLogin(event)">
          <div class="input-group">
            <label class="input-label">Username</label>
            <input type="text" id="loginUser" class="input-field" placeholder="Enter username" required autocomplete="username">
          </div>
          <div class="input-group">
            <label class="input-label">Password</label>
            <input type="password" id="loginPass" class="input-field" placeholder="Enter password" required autocomplete="current-password">
          </div>
          
          <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
          
          <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In to OS
          </button>
        </form>
      </div>
      
      <!-- REGISTER FORM -->
      <div id="registerPanel" class="form-panel">
        <form onsubmit="handleRegister(event)">
          <div class="grid-2">
            <div class="input-group">
              <label class="input-label">Username</label>
              <input type="text" id="regUser" class="input-field" placeholder="Username" required autocomplete="username">
            </div>
            <div class="input-group">
              <label class="input-label">Email</label>
              <input type="email" id="regEmail" class="input-field" placeholder="Email address" required autocomplete="email">
            </div>
          </div>
          
          <div class="grid-2">
            <div class="input-group">
              <label class="input-label">Full Name</label>
              <input type="text" id="regFullName" class="input-field" placeholder="John Doe" required>
            </div>
            <div class="input-group">
              <label class="input-label">College/University</label>
              <input type="text" id="regCollege" class="input-field" placeholder="MIT, Stanford, etc." required>
            </div>
          </div>
          
          <div class="grid-2">
            <div class="input-group">
              <label class="input-label">Department</label>
              <input type="text" id="regDept" class="input-field" placeholder="e.g. Computer Science" required>
            </div>
            <div class="input-group">
              <label class="input-label">Role</label>
              <select id="regRole" class="input-field" onchange="toggleAdvisorSelect(this.value)">
                <option value="student">Student</option>
                <option value="faculty">Faculty</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          
          <div class="grid-2">
            <div class="input-group">
              <label class="input-label">Password</label>
              <input type="password" id="regPass" class="input-field" placeholder="Create password" required autocomplete="new-password">
            </div>
            <div class="input-group" id="advisorGroup">
              <label class="input-label">Select Faculty Advisor</label>
              <select id="regAdvisor" class="input-field">
                <option value="">No Advisor (Independent)</option>
              </select>
            </div>
          </div>
          
          <div class="input-group">
            <label class="input-label">Security Question (For Password Recovery)</label>
            <select id="regQuestion" class="input-field">
              <option value="What is the name of your first school?">What is the name of your first school?</option>
              <option value="What is your pet's name?">What is your pet's name?</option>
              <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
              <option value="In what city were you born?">In what city were you born?</option>
            </select>
          </div>
          
          <div class="input-group">
            <label class="input-label">Security Answer</label>
            <input type="text" id="regAnswer" class="input-field" placeholder="Enter answer" required>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
            <i class="fa-solid fa-user-plus"></i> Create Account
          </button>
        </form>
      </div>
      
    </div>
  </div>

  <script>
    // Register PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered successfully.'))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }

    document.addEventListener('DOMContentLoaded', loadAdvisors);

    async function loadAdvisors() {
      try {
        const res = await fetch('/api/faculty');
        if (res.ok) {
          const list = await res.json();
          const select = document.getElementById('regAdvisor');
          select.innerHTML = '<option value="">No Advisor (Independent)</option>' +
            list.map(f => `<option value="${f.id}">${f.fullName} (${f.username})</option>`).join('');
        }
      } catch (e) {
        console.error('Error loading advisors:', e);
      }
    }

    function toggleAdvisorSelect(role) {
      const group = document.getElementById('advisorGroup');
      if (role === 'student') {
        group.style.display = 'block';
      } else {
        group.style.display = 'none';
      }
    }

    function switchTab(tab) {
      const tabs = document.querySelectorAll('.tab-btn');
      tabs.forEach(btn => btn.classList.remove('active'));
      
      const panels = document.querySelectorAll('.form-panel');
      panels.forEach(p => p.classList.remove('active'));
      
      const alertBox = document.getElementById('alertBox');
      alertBox.style.display = 'none';
      
      if (tab === 'login') {
        tabs[0].classList.add('active');
        document.getElementById('loginPanel').classList.add('active');
      } else {
        tabs[1].classList.add('active');
        document.getElementById('registerPanel').classList.add('active');
        loadAdvisors(); // Refresh advisor list on tab switch
      }
    }
    
    function showAlert(msg, isSuccess = false) {
      const alertBox = document.getElementById('alertBox');
      alertBox.innerText = msg;
      alertBox.className = 'alert-box ' + (isSuccess ? 'alert-success' : 'alert-error');
      alertBox.style.display = 'block';
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUser').value;
      const password = document.getElementById('loginPass').value;
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        if (response.ok) {
          showAlert('Login successful! Redirecting...', true);
          localStorage.setItem('student_os_user', JSON.stringify(data.user));
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 1000);
        } else {
          showAlert(data.error || 'Login failed.');
        }
      } catch (err) {
        showAlert('Network error. Is server running?');
      }
    }
    
    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regUser').value;
      const email = document.getElementById('regEmail').value;
      const fullName = document.getElementById('regFullName').value;
      const collegeName = document.getElementById('regCollege').value;
      const department = document.getElementById('regDept').value;
      const password = document.getElementById('regPass').value;
      const role = document.getElementById('regRole').value;
      const securityQuestion = document.getElementById('regQuestion').value;
      const securityAnswer = document.getElementById('regAnswer').value;
      const facultyId = document.getElementById('regAdvisor').value;
      
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username, email, password, role,
            securityQuestion, securityAnswer, fullName, collegeName, department, facultyId
          })
        });
        
        const data = await response.json();
        if (response.ok) {
          const successMsg = data.isVerified 
            ? 'Registration successful! Please sign in.' 
            : 'Registration successful! Pending advisor verification before login.';
          showAlert(successMsg, true);
          setTimeout(() => {
            switchTab('login');
            document.getElementById('loginUser').value = username;
          }, 2500);
        } else {
          showAlert(data.error || 'Registration failed.');
        }
      } catch (err) {
        showAlert('Network error. Is server running?');
      }
    }
  </script>
</body>
</html>
